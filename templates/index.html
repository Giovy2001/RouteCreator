<head>
    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="manifest" href="/static/icons/site.webmanifest">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400&display=swap" rel="stylesheet">
    <!-- Title -->
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PalaEnrosadira - Chalk & Track</title>

    <link rel="stylesheet" href="/static/css/palette.css" type="text/css">
    <link rel="stylesheet" href="/static/css/bottom-nav.css" type="text/css">

    <link rel="stylesheet" href="/static/css/body.css" type="text/css">
    <link rel="stylesheet" href="/static/css/input.css" type="text/css">
    <link rel="stylesheet" href="/static/css/index.css" type="text/css">

    <!-- Local storage related scripts -->
    <script src="/static/js/profile/username.js" defer></script>
    <script src="/static/js/profile/bottom-nav-update.js" defer></script>

    <!-- Icons -->
    <script src="https://kit.fontawesome.com/4f9d6b6c17.js" crossorigin="anonymous"></script>
</head>

<!-- Background grain -->
<div class="background_color"></div>
<div class="grain"></div>

<body>
    <!-- Title -->
    <p>&emsp;</p>
    <div class="title">
        <h1>PalaEnrosadira</h1>
        <h3>Chalk & Track</h3>
    </div>

    <!-- User selector -->
    <p>&emsp;</p>
    <div class="userBar">
        <div class="userLabel">
            <a>Nome utente:</a>
        </div>
        <div class="usernameWrapper">
            <input type="text" id="usernameInput" class="flex-input" placeholder="Scrivi il tuo nome" onchange="saveUsername()">
            <button type="button" onclick="saveUsername()" class="default-button">Salva</button>
        </div>
    </div>

    <!-- New route button -->
    <div class="new-route">
        <button onclick="window.location.href='/select_image';" style="width: 100%;" class="default-button">Aggiungi un nuovo blocco</button>
    </div>
    <p>&emsp;</p>

    <!-- Grid -->
    <div class="grid">
        {% for route in routes %}
    
        <!-- Card spawner -->
        <a href="/route_{{route['route_id']}}" class="card">
            <img src="{{route['image_url']}}">
            <div class="card-title">
                {{route['route_name']}}
            </div>
            <div class="card-author">
                {{route['author']}}
            </div>
        </a>
    
        {% endfor %}
    </div>

    <div class="use-condition">
        <a href="/use_condition", class="use-condition">
            <span class="icon">i</span>
            Condizioni di utilizzo
        </a>
    </div>




    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='/';">
            <i class="fa-solid fa-fire fa-xl"></i>
            <span class="label">Esplora</span>
        </button>
        <button class="nav-item" id="create-button-hidden">
            <i class="fa-solid fa-circle-plus fa-xl"></i>
            <span class="label">Crea</span>
        </button>
        <button class="nav-item">
            <i class="fa-solid fa-box-open fa-xl"></i>
            <span class="label">Archivio</span>
        </button>
        <button class="nav-item" onclick="window.location.href='/profile';">
            <i class="fa-solid fa-user fa-xl"></i>
            <span class="label">Profilo</span>
        </button>
    </nav>
</body>
